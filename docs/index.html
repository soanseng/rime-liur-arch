  <script>
    // 亮暗色切換功能
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }
    
    // 載入時檢查儲存的主題偏好
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
    
    // 把亮暗色按鈕插入到 sidebar 標題旁邊
    function insertThemeToggle() {
      const appName = document.querySelector('.app-name-link');
      if (appName && !document.querySelector('.theme-toggle')) {
        const btn = document.createElement('button');
        btn.className = 'theme-toggle';
        btn.title = '切換亮暗色主題';
        btn.onclick = toggleTheme;
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        appName.parentNode.insertBefore(btn, appName.nextSibling);
      }
    }
    
    // 頁面載入後插入按鈕
    window.addEventListener('load', function() {
      setTimeout(insertThemeToggle, 200);
    });
    
    // 動態修正深色模式元素背景
    function fixDarkModeElements() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      // 搜尋框區塊
      const searchEl = document.querySelector('.sidebar .search');
      if (searchEl) {
        searchEl.style.setProperty('background-color', isDark ? '#1a1a2e' : '', 'important');
        searchEl.style.setProperty('background', isDark ? '#1a1a2e' : '', 'important');
      }
      // 手機版底部導航列
      const toggleEl = document.querySelector('.sidebar-toggle');
      if (toggleEl) {
        toggleEl.style.setProperty('background-color', isDark ? '#1a1a2e' : '', 'important');
      }
    }
    
    // 頁面載入後執行
    window.addEventListener('load', function() {
      setTimeout(fixDarkModeElements, 100);
      // 監聽主題切換
      const observer = new MutationObserver(function() {
        setTimeout(fixDarkModeElements, 50);
      });
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    });

    window.$docsify = {
      name: '蝦米輸入方案',
      repo: 'ryanwuson/rime-liur',
      homepage: 'user-guide.md',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      search: {
        placeholder: '搜尋',
        noData: '找不到結果',
        paths: 'auto'
      }
    }
  </script>
